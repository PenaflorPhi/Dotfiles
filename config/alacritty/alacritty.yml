env:
  TERM: alacritty
window:
  dimensions:
    columns: 0
    lines: 0
  title: Alacritty
  class:
    instance: Alacritty
    general: Alacritty
scrolling:
  history: 10000
  multiplier: 3
font:
  normal:
    family: Liga SFMono Nerd Font
  bold:
    family: Liga SFMono Nerd Font
  italic:
    family: Liga SFMono Nerd Font
  bold_italic:
    family: Liga SFMono Nerd Font
  size: 11.5
bell:
  animation: EaseOutExpo
background_opacity: 0.5
cursor:
  style:
    shape: Block
    blinking: On
  blink_interval: 500
shell:
  program: /bin/bash
  args:
    - --login
mouse:
  hide_when_typing: true

colors:
  # Default colors
  primary:
    # hard contrast: background = '#1d2021'
    background: '#282828'
    # soft contrast: background = '#32302f'
    foreground: '#ebdbb2'

  # Normal colors
  normal:
    black: '#282828'
    red: '#cc241d'
    green: '#98971a'
    yellow: '#d79921'
    blue: '#458588'
    magenta: '#b16286'
    cyan: '#689d6a'
    white: '#a89984'

  # Bright colors
  bright:
    black: '#928374'
    red: '#fb4934'
    green: '#b8bb26'
    yellow: '#fabd2f'
    blue: '#83a598'
    magenta: '#d3869b'
    cyan: '#8ec07c'
    white: '#ebdbb2'
theme: Gruvbox-Dark
